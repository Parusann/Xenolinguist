<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a10"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00A854"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)" stroke="rgba(0,230,118,0.15)" stroke-width="0.5"/>
  <text x="16" y="22" text-anchor="middle" font-size="16" font-weight="700" font-family="monospace" fill="url(#accent)" filter="url(#glow)">XL</text>
</svg>
